name: Keep Render service awake

# Render's free tier sleeps after ~15 min with no incoming HTTP traffic and
# takes 30-50s to wake back up on the next request — too slow for a chat
# command mid-stream. This pings the live site every 10 minutes so it never
# goes idle long enough to sleep in the first place.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping overlay
        run: curl -sf --max-time 60 https://fh6-random-car.onrender.com/overlay.html > /dev/null
